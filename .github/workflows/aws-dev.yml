name: Deploy-Application

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin {{secrets.ECR_REPO_URL}}  

      - name: Build and push Docker image
        run: |
          BRANCH_NAME=${{ github.ref_name }}
          docker build -t pokemon-app .
          docker tag pokemon-app ${{ secrets.ECR_REPO_URL }}/pokemon-app:$BRANCH_NAME
          docker push ${{ secrets.ECR_REPO_URL }}/pokemon-app:$BRANCH_NAME

      - name: Deploy Application
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 | docker login \
              --username AWS \
              --password-stdin ${{ secrets.ECR_REPO_URL }}
            cd /home/ubuntu/pokemon-app && docker compose up -d
