
name: Build and Deploy app with argo

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the application source code
      - name: Checkout app repository
        uses: actions/checkout@v3

      # Step 2: Capture short commit SHA (first 7 characters)
      - name: Set commit SHA
        id: vars
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

      # Step 3: Login to DockerHub
      - name: Log in to DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # Step 4: Build image tagged with commit SHA, push to DockerHub
      - name: Build and Push Docker Image
        run: |
          SHORT_SHA=${{ steps.vars.outputs.SHORT_SHA }}
          docker build -t pokemon:${SHORT_SHA} -f Dockerfile .
          docker tag pokemon:${SHORT_SHA} ${{ secrets.DOCKERHUB_USERNAME }}/pokemon:${SHORT_SHA}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pokemon:${SHORT_SHA}
          echo "IMAGE_TAG=${SHORT_SHA}" >> $GITHUB_ENV

      # Step 5: Checkout the SEPARATE manifest/Helm repo using PAT
      - name: Checkout Helm repository
        uses: actions/checkout@v3
        with:
          repository: 404bad/kubernetes
          token: ${{ secrets.GH_PAT }}
          path: helm 

      # Step 6: Update image tag in values.yaml using sed
      - name: Update image tag
        run: |
          FILE="helm/pokemonapp/values.yaml"
          sed -i "s/tag:.*/tag: \"${IMAGE_TAG}\"/" $FILE
          cat $FILE  

      # Step 7: Commit and push the updated values.yaml to manifest repo
      - name: Commit and push changes
        run: |
          cd helm
          git config --global user.email "kailashbaduatwork@gmail.com"
          git config --global user.name "Kailash Badu"
          git add .
          git commit -m "Update image to tag ${IMAGE_TAG}"
          git push